name        = "coffee-budget"
version     = "0.3.0"
description = "Labels transactions whose description matches a keyword (default: coffee)."
author      = "kasas community"
runtime     = "lua"
entrypoint  = "main.lua"

# Registry-only metadata (the kasas host ignores these keys).
license  = "MIT"
homepage = "https://github.com/paulmeier/kasas-plugins/tree/main/plugins/coffee-budget"

hooks        = ["OnTransactionCreate", "OnTransactionUpdate", "OnPageRender", "OnPageAction", "OnUninstall"]
capabilities = ["transactions:read", "labels:write", "ui:page"]

# The dashboard page: a "Coffee Budget" sidebar entry at /ext/coffee-budget,
# rendered by OnPageRender below.
[ui]
title = "Coffee Budget"
icon  = "coin"

[config]
keyword  = "coffee"
category = "food"
