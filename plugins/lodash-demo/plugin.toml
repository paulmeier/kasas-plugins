name        = "lodash-demo"
version     = "0.1.0"
description = "Summarizes transactions using the bundled lodash library (ADR 0001 demo)."
author      = "kasas community"
runtime     = "js"
entrypoint  = "main.js"

license  = "MIT"
homepage = "https://github.com/paulmeier/kasas-plugins/tree/main/plugins/lodash-demo"

hooks        = ["OnTransactionCreate", "OnUninstall"]
capabilities = ["transactions:read", "extensions:write"]

# ADR 0001: main.js is a dependency bundle, not hand-written. It is reproduced from
# the linked source at this pinned commit; `validate --verify-build` proves the
# committed main.js matches a fresh bundle byte-for-byte.
[build]
repository = "https://github.com/paulmeier/kasas-plugins"
ref        = "d22bdb1efad355556ebde768d90cc94c2d7c7f37"
entry      = "examples/lodash-demo/src/main.ts"
